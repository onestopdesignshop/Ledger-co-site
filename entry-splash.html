<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger & Co. — Capital Systems Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --onyx: #0A0A0C;
    --onyx-2: #14141A;
    --diamond: #F5F4F2;
    --gold: #C9A227;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--onyx);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
  }

  /* ---------- Stage ---------- */
  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(ellipse at 50% 38%, rgba(40,40,48,0.9) 0%, rgba(10,10,12,1) 62%),
      linear-gradient(160deg, #0A0A0C 0%, #131319 55%, #0A0A0C 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ---------- Facet lines (diamond cut suggestion) ---------- */
  .facets {
    position: absolute; inset: 0;
    opacity: 0.5;
    background:
      linear-gradient(115deg, transparent 46%, rgba(255,255,255,0.025) 47%, transparent 49%),
      linear-gradient(245deg, transparent 46%, rgba(255,255,255,0.02) 47%, transparent 49%),
      linear-gradient(65deg, transparent 60%, rgba(201,162,39,0.025) 61%, transparent 63%);
    pointer-events: none;
  }

  /* ---------- Smoke layers ---------- */
  .smoke {
    position: absolute;
    inset: -20%;
    pointer-events: none;
    filter: blur(2px);
  }
  .smoke span {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.035) 45%, transparent 75%);
    opacity: 0;
  }
  .smoke span:nth-child(1) {
    width: 620px; height: 620px; left: 8%; top: 30%;
    animation: drift1 13s ease-in-out infinite;
  }
  .smoke span:nth-child(2) {
    width: 520px; height: 520px; left: 55%; top: 10%;
    animation: drift2 16s ease-in-out infinite; animation-delay: 1.5s;
  }
  .smoke span:nth-child(3) {
    width: 700px; height: 700px; left: 38%; top: 45%;
    animation: drift3 19s ease-in-out infinite; animation-delay: 3s;
  }
  .smoke span:nth-child(4) {
    width: 460px; height: 460px; left: 68%; top: 55%;
    animation: drift1 15s ease-in-out infinite; animation-delay: 4.5s;
  }
  .smoke span:nth-child(5) {
    width: 380px; height: 380px; left: 18%; top: 60%;
    animation: drift2 12s ease-in-out infinite; animation-delay: 2s;
  }

  @keyframes drift1 {
    0%   { transform: translate(0, 0) scale(0.9); opacity: 0; }
    20%  { opacity: 0.55; }
    50%  { transform: translate(60px, -40px) scale(1.15); opacity: 0.4; }
    80%  { opacity: 0.2; }
    100% { transform: translate(140px, -90px) scale(1.3); opacity: 0; }
  }
  @keyframes drift2 {
    0%   { transform: translate(0, 0) scale(1); opacity: 0; }
    25%  { opacity: 0.45; }
    55%  { transform: translate(-70px, 50px) scale(1.2); opacity: 0.3; }
    100% { transform: translate(-150px, 110px) scale(1.4); opacity: 0; }
  }
  @keyframes drift3 {
    0%   { transform: translate(0,0) scale(0.85); opacity: 0; }
    30%  { opacity: 0.35; }
    60%  { transform: translate(40px, 60px) scale(1.1); opacity: 0.22; }
    100% { transform: translate(100px, 140px) scale(1.25); opacity: 0; }
  }

  /* ---------- 8-ball + Ace of Diamonds mark ---------- */
  .mark {
    position: relative;
    width: 110px; height: 110px;
    margin: 0 auto 18px;
    opacity: 0;
    transform: scale(0.5);
    filter: drop-shadow(0 0 22px rgba(245,244,242,0.22));
    animation: markIn 1.1s ease-out 0.3s forwards;
  }
  .mark svg { width: 100%; height: 100%; }
  @keyframes markIn {
    0% { opacity: 0; transform: scale(0.4); }
    60% { opacity: 1; }
    100% { opacity: 1; transform: scale(1); }
  }

  /* ---------- Curved text (the "diameter of words") ---------- */
  .content { position: relative; z-index: 3; text-align: center; }

  .arc-wrap {
    position: relative;
    width: 720px;
    max-width: 88vw;
    height: 240px;
    margin: 0 auto;
  }
  svg.arc-text { width: 100%; height: 100%; overflow: visible; }
  svg.arc-text text {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    fill: var(--diamond);
    letter-spacing: 1.5px;
    opacity: 0;
    animation: textIn 1.6s ease-out 0.9s forwards;
  }
  @keyframes textIn {
    0% { opacity: 0; filter: blur(6px); }
    100% { opacity: 1; filter: blur(0); }
  }

  .glow-text {
    text-shadow: 0 0 18px rgba(245,244,242,0.55), 0 0 46px rgba(245,244,242,0.18);
  }

  .subline {
    font-size: 11.5px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 4px;
    opacity: 0;
    animation: fadeUp 1.2s ease-out 1.9s forwards;
  }
  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .hairline {
    width: 1px;
    height: 36px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    margin: 22px auto 0;
    opacity: 0;
    animation: fadeUp 1.2s ease-out 2.3s forwards;
  }

  /* ---------- Skip / progress ---------- */
  .skip {
    position: absolute;
    bottom: 36px; left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0;
    animation: fadeUp 1s ease-out 2.6s forwards;
  }
  .skip a {
    color: rgba(245,244,242,0.55);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-decoration: none;
    transition: color 0.2s;
  }
  .skip a:hover { color: var(--diamond); }
  .skip a:focus-visible { outline: 1px solid var(--gold); outline-offset: 4px; }

  .progress-track {
    width: 140px; height: 1px;
    background: rgba(245,244,242,0.15);
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 0%;
    background: var(--gold);
    animation: fill 4.2s linear 0.2s forwards;
  }
  @keyframes fill { to { width: 100%; } }

  /* ---------- Exit transition ---------- */
  .stage.leaving { animation: fadeOut 0.6s ease-in forwards; }
  @keyframes fadeOut { to { opacity: 0; } }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="facets"></div>
  <div class="smoke" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="content">
    <div class="mark">
      <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="ballGrad" cx="38%" cy="32%" r="75%">
            <stop offset="0%" stop-color="#2b2b30"/>
            <stop offset="55%" stop-color="#1c1c1f"/>
            <stop offset="100%" stop-color="#101012"/>
          </radialGradient>
          <radialGradient id="ballHighlight" cx="35%" cy="28%" r="20%">
            <stop offset="0%" stop-color="#F5F4F2" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#F5F4F2" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- 8-ball: off-black, visible against the page background -->
        <circle cx="110" cy="115" r="72" fill="url(#ballGrad)" stroke="#050506" stroke-width="1.5"/>
        <circle cx="110" cy="115" r="72" fill="url(#ballHighlight)"/>

        <!-- diamond-white number circle -->
        <circle cx="110" cy="118" r="26" fill="#F5F4F2" opacity="0.82"/>
        <text x="110" y="129" font-family="Georgia, serif" font-size="30" font-weight="bold"
              text-anchor="middle" fill="#1c1c1f" opacity="0.9">8</text>

        <!-- Ace of Diamonds card, overlapping the ball -->
        <g transform="translate(138,68) rotate(16)">
          <rect x="-26" y="-38" width="52" height="76" rx="5"
                fill="#0A0A0C" stroke="#F5F4F2" stroke-width="1.6"/>
          <rect x="-22" y="-34" width="44" height="68" rx="3"
                fill="none" stroke="#F5F4F2" stroke-width="0.5" opacity="0.4"/>
          <text x="-19" y="-20" font-family="Georgia, serif" font-size="11" font-weight="bold"
                fill="#F5F4F2" text-anchor="middle">A</text>
          <path d="M -19 -14 L -15 -7 L -19 0 L -23 -7 Z" fill="#F5F4F2"/>
          <path d="M 0 -14 L 12 4 L 0 22 L -12 4 Z" fill="#F5F4F2"/>
          <g transform="rotate(180)">
            <text x="-19" y="-20" font-family="Georgia, serif" font-size="11" font-weight="bold"
                  fill="#F5F4F2" text-anchor="middle">A</text>
            <path d="M -19 -14 L -15 -7 L -19 0 L -23 -7 Z" fill="#F5F4F2"/>
          </g>
        </g>
      </svg>
    </div>

    <div class="arc-wrap">
      <svg class="arc-text" viewBox="0 0 720 240" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
        <defs>
          <path id="arcPath" d="M 10 200 Q 360 10 710 200" />
        </defs>
        <text class="glow-text" font-size="30">
          <textPath href="#arcPath" xlink:href="#arcPath" startOffset="50%" text-anchor="middle">
            WELCOME TO A BRIGHTER FUTURE
          </textPath>
        </text>
      </svg>
    </div>

    <div class="subline">Ledger &amp; Co. — Capital Systems Suite</div>
    <div class="hairline"></div>
  </div>

  <div class="skip">
    <a href="capital-systems-suite.html" id="skipLink">Enter now</a>
    <div class="progress-track"><div class="progress-fill"></div></div>
  </div>
</div>

<script>
  var DESTINATION = "capital-systems-suite.html";
  var stage = document.getElementById('stage');
  var skipLink = document.getElementById('skipLink');
  var navigated = false;

  function go() {
    if (navigated) return;
    navigated = true;
    stage.classList.add('leaving');
    setTimeout(function () { window.location.href = DESTINATION; }, 580);
  }

  skipLink.addEventListener('click', function (e) {
    e.preventDefault();
    go();
  });

  setTimeout(go, 4400);
</script>

</body>
</html>
