<!-- ============ SHOP BUTTON (signed-in shop entry, stays signed in) ============ -->
<style>
  #shopNavLink, #accountNavLink{ display:none; }
  body.is-authed #shopNavLink{ display:inline-block; }
  body.is-authed #accountNavLink{ display:inline-block; }
  body.is-authed .sign-in-link{ display:none; }
  .dash-shop-btn{
    display:inline-block; margin-top:10px;
    font-family:'JetBrains Mono',monospace; text-transform:uppercase;
    letter-spacing:0.12em; font-size:12px; font-weight:500;
    color:#0a1124; background:var(--gold, #c9a13b);
    border:none; border-radius:3px; cursor:pointer;
    padding:13px 26px; text-decoration:none;
    transition:background .2s ease;
  }
  .dash-shop-btn:hover{ background:var(--gold-bright, #e7c86a); }
  #accountNavLink{
    cursor:pointer; color:inherit; text-decoration:none;
  }
</style>
<script>
(function(){
  function injectShopNav(){
    var navLinks = document.getElementById('navLinks');
    if(navLinks && !document.getElementById('shopNavLink')){
      var a = document.createElement('a');
      a.id = 'shopNavLink';
      a.href = '#guides';
      a.textContent = 'Shop';
      a.addEventListener('click', function(e){ e.preventDefault(); goShop(); });
      navLinks.appendChild(a);
    }
  }
  function injectAccountNav(){
    var actions = document.querySelector('header nav > div:last-child');
    if(actions && !document.getElementById('accountNavLink')){
      var a = document.createElement('a');
      a.id = 'accountNavLink';
      a.href = '#';
      a.textContent = 'My Account';
      a.addEventListener('click', function(e){
        e.preventDefault();
        var dash = document.getElementById('dashboard');
        if(dash){ dash.classList.add('show'); document.body.style.overflow = 'hidden'; }
      });
      var signInLink = actions.querySelector('.sign-in-link');
      if(signInLink){ actions.insertBefore(a, signInLink); }
      else { actions.appendChild(a); }
    }
  }
  function injectDashShopBtn(){
    var dashHero = document.querySelector('#dashboard .dash-hero');
    if(dashHero && !document.getElementById('dashShopBtn')){
      var btn = document.createElement('button');
      btn.id = 'dashShopBtn';
      btn.className = 'dash-shop-btn';
      btn.textContent = 'Browse plans →';
      btn.addEventListener('click', goShop);
      dashHero.appendChild(btn);
    }
  }
  function goShop(){
    var dash = document.getElementById('dashboard');
    if(dash){ dash.classList.remove('show'); }
    document.body.style.overflow = '';
    document.body.classList.add('is-authed');
    var guides = document.getElementById('guides');
    if(guides){ guides.scrollIntoView({ behavior:'smooth', block:'start' }); }
  }
  function setAuthed(on){
    document.body.classList.toggle('is-authed', !!on);
  }
  function wrapAuthFns(){
    if(typeof window.signOut === 'function' && !window.__shopWrappedLogout){
      var origOut = window.signOut;
      window.signOut = async function(){
        var r = await origOut.apply(this, arguments);
        setAuthed(false);
        return r;
      };
      window.__shopWrappedLogout = true;
    }
  }
  function watchSession(){
    var sb = window.__ledgerSupabaseClient;
    if(!sb || !sb.auth){ setAuthed(false); return; }
    function check(){
      sb.auth.getSession().then(function(res){
        var signedIn = !!(res && res.data && res.data.session && res.data.session.user);
        setAuthed(signedIn);
      }).catch(function(){ setAuthed(false); });
    }
    check();
    if(typeof sb.auth.onAuthStateChange === 'function'){
      sb.auth.onAuthStateChange(function(event){
        // Explicitly handle sign-out so the Sign in link returns.
        if(event === 'SIGNED_OUT'){ setAuthed(false); }
        else { check(); }
      });
    }
  }
  function init(){
    injectShopNav();
    injectAccountNav();
    injectDashShopBtn();
    wrapAuthFns();
    watchSession();
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
